<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        width: 1024px;
        height: 1024px;
        overflow: hidden;
        background: transparent;
      }
      /* macOS squircle-ish app tile */
      .bg {
        position: absolute;
        inset: 96px;
        border-radius: 208px;
        background:
          radial-gradient(135% 135% at 28% 18%, #2b3050 0%, #1a1c2e 52%, #0e0f15 100%);
        box-shadow: inset 0 6px 26px rgba(255, 255, 255, 0.06), inset 0 -10px 40px rgba(0, 0, 0, 0.5);
        overflow: hidden;
      }
      /* the glowing jewel orb */
      .orb {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 460px;
        height: 460px;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        background:
          radial-gradient(circle at 34% 25%, #f2f4ff 0%, transparent 26%),
          radial-gradient(125% 125% at 42% 32%, #93a4ff 0%, #5b6cf0 52%, #2b3499 100%);
        box-shadow: 0 0 0 22px rgba(91, 108, 240, 0.16), 0 48px 130px -16px rgba(91, 108, 240, 0.75),
          inset 0 14px 40px rgba(255, 255, 255, 0.55), inset 0 -40px 64px rgba(0, 0, 0, 0.32);
      }
    </style>
  </head>
  <body>
    <div class="bg"><div class="orb"></div></div>
  </body>
</html>
